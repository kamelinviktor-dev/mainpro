<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="MainPro Jobs">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f2420"/>
      <stop offset="100%" stop-color="#0b1a16"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect x="3" y="3" width="506" height="506" rx="111" fill="none" stroke="rgba(80,227,164,0.22)" stroke-width="3"/>
  <text x="256" y="334" text-anchor="middle" filter="url(#glow)"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="900" font-size="198" letter-spacing="-22" fill="#50e3a4">MP</text>
</svg>
