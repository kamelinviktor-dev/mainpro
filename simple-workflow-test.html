<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Workflow Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function SimpleWorkflowTest() {
            const [step, setStep] = useState(0);
            const [workflow, setWorkflow] = useState(null);
            const [events, setEvents] = useState([]);

            function generateWorkflow() {
                const workflow = {
                    name: "План проверки безопасности",
                    tasks: [
                        { name: "Проверить пожарные датчики", category: "Fire Safety", priority: "high" },
                        { name: "Тестировать аварийное освещение", category: "Fire Safety", priority: "high" },
                        { name: "Осмотреть аварийные выходы", category: "Fire Safety", priority: "high" },
                        { name: "Проверить огнетушители", category: "Fire Safety", priority: "medium" },
                        { name: "Проверить HVAC фильтры", category: "HVAC", priority: "low" },
                        { name: "Тестировать электрические панели", category: "Electrical", priority: "medium" }
                    ]
                };
                setWorkflow(workflow);
                setStep(1);
            }

            function applyToCalendar() {
                const today = new Date();
                today.setHours(9, 0, 0, 0);
                
                const newEvents = workflow.tasks.map((task, index) => {
                    const dayOffset = Math.floor(index / 3);
                    const hourOffset = (index % 3) * 3;
                    
                    const taskDate = new Date(today);
                    taskDate.setDate(today.getDate() + dayOffset);
                    taskDate.setHours(9 + hourOffset, 0, 0, 0);
                    
                    const endDate = new Date(taskDate);
                    endDate.setHours(taskDate.getHours() + 2);
                    
                    return {
                        id: Date.now() + index,
                        title: task.name,
                        start: taskDate.toISOString(),
                        end: endDate.toISOString(),
                        category: task.category,
                        priority: task.priority
                    };
                });
                
                setEvents(newEvents);
                setStep(2);
            }

            return (
                <div className="p-6 max-w-2xl mx-auto">
                    <h1 className="text-2xl font-bold mb-6 text-center">🧪 Простой тест AI Workflow</h1>
                    
                    {/* Step 0: Generate */}
                    {step === 0 && (
                        <div className="text-center">
                            <div className="mb-6 p-6 bg-blue-50 rounded-lg">
                                <h2 className="text-lg font-semibold mb-2">Шаг 1: Генерация плана</h2>
                                <p className="text-gray-600 mb-4">AI создаст план задач на основе вашего запроса</p>
                                <button
                                    onClick={generateWorkflow}
                                    className="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 text-lg"
                                >
                                    🧠 Сгенерировать план
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Step 1: Review */}
                    {step === 1 && workflow && (
                        <div className="space-y-4">
                            <div className="p-4 bg-green-50 rounded-lg">
                                <h2 className="text-lg font-semibold mb-2">✅ План создан!</h2>
                                <p className="text-gray-600 mb-4">AI сгенерировал {workflow.tasks.length} задач</p>
                                
                                <div className="space-y-2">
                                    <h3 className="font-medium">Список задач:</h3>
                                    {workflow.tasks.map((task, index) => (
                                        <div key={index} className="flex items-center gap-2 p-2 bg-white rounded border">
                                            <span className="text-blue-500">•</span>
                                            <span className="flex-1">{task.name}</span>
                                            <span className="text-xs px-2 py-1 bg-gray-100 rounded">{task.category}</span>
                                        </div>
                                    ))}
                                </div>
                                
                                <button
                                    onClick={applyToCalendar}
                                    className="mt-4 px-6 py-2 bg-green-500 text-white rounded hover:bg-green-600"
                                >
                                    📅 Применить к календарю
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Step 2: Calendar */}
                    {step === 2 && events.length > 0 && (
                        <div className="space-y-4">
                            <div className="p-4 bg-yellow-50 rounded-lg">
                                <h2 className="text-lg font-semibold mb-2">🎉 Готово! Задачи добавлены в календарь</h2>
                                <p className="text-gray-600 mb-4">Все {events.length} задач распределены по дням и времени</p>
                                
                                <div className="space-y-2">
                                    <h3 className="font-medium">Расписание в календаре:</h3>
                                    {events.map((event, index) => {
                                        const start = new Date(event.start);
                                        const day = start.toLocaleDateString('ru-RU');
                                        const time = start.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                                        const dayNames = ['Сегодня', 'Завтра', 'День 3'];
                                        const dayName = dayNames[Math.floor(index / 3)] || `День ${Math.floor(index / 3) + 1}`;
                                        
                                        return (
                                            <div key={index} className="flex items-center gap-2 p-2 bg-white rounded border">
                                                <span className="text-blue-500">•</span>
                                                <div className="flex-1">
                                                    <div className="font-medium">{event.title}</div>
                                                    <div className="text-xs text-gray-500 flex gap-2">
                                                        <span className="px-1 py-0.5 bg-blue-100 text-blue-800 rounded">{dayName}</span>
                                                        <span className="px-1 py-0.5 bg-green-100 text-green-800 rounded">{time}</span>
                                                        <span>{event.category}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="mt-4 p-3 bg-blue-50 rounded">
                                    <h4 className="font-medium mb-2">📊 Результат:</h4>
                                    <ul className="text-sm space-y-1">
                                        <li>• <strong>Сегодня:</strong> 3 задачи (09:00, 12:00, 15:00)</li>
                                        <li>• <strong>Завтра:</strong> 3 задачи (09:00, 12:00, 15:00)</li>
                                        <li>• <strong>День 3:</strong> остальные задачи</li>
                                    </ul>
                                </div>
                                
                                <button
                                    onClick={() => {
                                        setStep(0);
                                        setWorkflow(null);
                                        setEvents([]);
                                    }}
                                    className="mt-4 px-6 py-2 bg-gray-500 text-white rounded hover:bg-gray-600"
                                >
                                    🔄 Начать заново
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Instructions */}
                    <div className="mt-8 p-4 bg-gray-50 rounded-lg">
                        <h3 className="font-medium mb-2">📋 Как это работает:</h3>
                        <ol className="text-sm space-y-1 list-decimal list-inside">
                            <li>AI Workflow Builder создает план задач из вашего описания</li>
                            <li>Система автоматически распределяет задачи по дням (3 задачи в день)</li>
                            <li>Каждая задача получает время (09:00, 12:00, 15:00)</li>
                            <li>Все задачи добавляются в календарь с правильным расписанием</li>
                        </ol>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<SimpleWorkflowTest />, document.getElementById('root'));
    </script>
</body>
</html>
