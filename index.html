<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/mainpro/manifest.json">
  <meta name="theme-color" content="#02110d">
  <meta name="color-scheme" content="dark">
  <title>MainPro Jobs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0b1a16;
      color: #f8fafc;
      -webkit-font-smoothing: antialiased;
    }
    .splash {
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(32px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      background: linear-gradient(165deg, #0f2420 0%, #0b1a16 45%, #081410 100%);
    }
    .splash-inner {
      width: 100%;
      max-width: 22rem;
      text-align: center;
      opacity: 0;
      animation: splashIn 0.7s ease-out forwards;
      animation-delay: 0.05s;
    }
    @keyframes splashIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .splash-inner {
        animation: none;
        opacity: 1;
        transform: none;
      }
    }
    .splash-icon {
      width: 5.75rem;
      height: 5.75rem;
      margin: 0 auto 1.5rem;
      border-radius: 1.35rem;
      object-fit: cover;
      display: block;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(80, 227, 164, 0.2);
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 1.85rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f1f5f9;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .sub {
      font-size: clamp(0.95rem, 3.2vw, 1.05rem);
      font-weight: 500;
      color: rgba(80, 227, 164, 0.9);
      letter-spacing: 0.02em;
      margin-bottom: 1.75rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 3rem;
      padding: 0 1.75rem;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #0b1a16;
      text-decoration: none;
      border: none;
      border-radius: 0.875rem;
      cursor: pointer;
      background: linear-gradient(180deg, #6aedbd 0%, #50e3a4 40%, #3ecf94 100%);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.35) inset,
        0 4px 22px rgba(80, 227, 164, 0.35);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:active {
      transform: scale(0.98);
    }
    @media (hover: hover) {
      .btn:hover {
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.38) inset,
          0 6px 28px rgba(80, 227, 164, 0.45);
      }
    }
  </style>
</head>
<body>
  <main class="splash">
    <div class="splash-inner">
      <img class="splash-icon" src="/mainpro/icon.svg" width="92" height="92" alt="" decoding="async">
      <h1>MainPro Jobs</h1>
      <p class="sub">Intelligent Hotel Operations</p>
      <a class="btn" href="MAINPRO-MAIN/MAINPRO-MAIN/mainpro-jobs/">Enter App</a>
    </div>
  </main>
</body>
</html>
