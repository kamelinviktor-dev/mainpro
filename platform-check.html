<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MainPro Platform Check</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PlatformCheck() {
            const [checks, setChecks] = useState([]);
            const [isRunning, setIsRunning] = useState(false);
            const [overallStatus, setOverallStatus] = useState('pending');

            function addCheck(category, feature, status, message, details = '') {
                setChecks(prev => [...prev, { 
                    category, 
                    feature, 
                    status, 
                    message, 
                    details,
                    timestamp: new Date().toLocaleTimeString() 
                }]);
            }

            async function runPlatformCheck() {
                setIsRunning(true);
                setChecks([]);
                setOverallStatus('running');

                // 1. Server Connectivity
                addCheck('Infrastructure', 'Server', 'info', 'Checking server connectivity...');
                try {
                    const response = await fetch('http://localhost:3000/index.html');
                    if (response.ok) {
                        addCheck('Infrastructure', 'Server', 'success', 'Server is running and accessible', `Status: ${response.status}`);
                    } else {
                        addCheck('Infrastructure', 'Server', 'error', 'Server returned error', `Status: ${response.status}`);
                    }
                } catch (error) {
                    addCheck('Infrastructure', 'Server', 'error', 'Server connection failed', error.message);
                }

                // 2. React Dependencies
                addCheck('Dependencies', 'React', 'info', 'Checking React availability...');
                if (typeof React !== 'undefined') {
                    addCheck('Dependencies', 'React', 'success', 'React is loaded', `Version: ${React.version}`);
                } else {
                    addCheck('Dependencies', 'React', 'error', 'React not available');
                }

                addCheck('Dependencies', 'ReactDOM', 'info', 'Checking ReactDOM availability...');
                if (typeof ReactDOM !== 'undefined') {
                    addCheck('Dependencies', 'ReactDOM', 'success', 'ReactDOM is loaded');
                } else {
                    addCheck('Dependencies', 'ReactDOM', 'error', 'ReactDOM not available');
                }

                addCheck('Dependencies', 'FullCalendar', 'info', 'Checking FullCalendar availability...');
                if (typeof FullCalendar !== 'undefined') {
                    addCheck('Dependencies', 'FullCalendar', 'success', 'FullCalendar is loaded');
                } else {
                    addCheck('Dependencies', 'FullCalendar', 'error', 'FullCalendar not available');
                }

                // 3. Local Storage
                addCheck('Storage', 'LocalStorage', 'info', 'Checking localStorage availability...');
                try {
                    localStorage.setItem('test', 'test');
                    localStorage.removeItem('test');
                    addCheck('Storage', 'LocalStorage', 'success', 'localStorage is working');
                } catch (error) {
                    addCheck('Storage', 'LocalStorage', 'error', 'localStorage not available', error.message);
                }

                // 4. MainPro Data
                addCheck('Data', 'MainPro Events', 'info', 'Checking MainPro events data...');
                try {
                    const events = JSON.parse(localStorage.getItem('mainpro_events_v65') || '[]');
                    addCheck('Data', 'MainPro Events', 'success', `Found ${events.length} events`);
                } catch (error) {
                    addCheck('Data', 'MainPro Events', 'error', 'Events data corrupted', error.message);
                }

                addCheck('Data', 'MainPro Categories', 'info', 'Checking MainPro categories data...');
                try {
                    const categories = JSON.parse(localStorage.getItem('mainpro_categories_v65') || '[]');
                    addCheck('Data', 'MainPro Categories', 'success', `Found ${categories.length} categories`);
                } catch (error) {
                    addCheck('Data', 'MainPro Categories', 'error', 'Categories data corrupted', error.message);
                }

                addCheck('Data', 'Document Manager', 'info', 'Checking Document Manager data...');
                try {
                    const docs = JSON.parse(localStorage.getItem('mainpro_documents') || '[]');
                    const folders = JSON.parse(localStorage.getItem('mainpro_folders') || '[]');
                    addCheck('Data', 'Document Manager', 'success', `Found ${docs.length} documents, ${folders.length} folders`);
                } catch (error) {
                    addCheck('Data', 'Document Manager', 'error', 'Document Manager data corrupted', error.message);
                }

                // 5. Browser Features
                addCheck('Browser', 'File API', 'info', 'Checking File API support...');
                if (typeof FileReader !== 'undefined') {
                    addCheck('Browser', 'File API', 'success', 'File API is supported');
                } else {
                    addCheck('Browser', 'File API', 'error', 'File API not supported');
                }

                addCheck('Browser', 'Drag & Drop', 'info', 'Checking Drag & Drop support...');
                if ('draggable' in document.createElement('div')) {
                    addCheck('Browser', 'Drag & Drop', 'success', 'Drag & Drop is supported');
                } else {
                    addCheck('Browser', 'Drag & Drop', 'error', 'Drag & Drop not supported');
                }

                addCheck('Browser', 'URL API', 'info', 'Checking URL API support...');
                if (typeof URL !== 'undefined' && URL.createObjectURL) {
                    addCheck('Browser', 'URL API', 'success', 'URL API is supported');
                } else {
                    addCheck('Browser', 'URL API', 'error', 'URL API not supported');
                }

                // 6. AI Workflow Builder Test
                addCheck('AI Features', 'Workflow Builder', 'info', 'Testing AI Workflow Builder...');
                try {
                    const testPrompt = 'Create monthly fire safety inspection plan';
                    const lowerPrompt = testPrompt.toLowerCase();
                    const hasFire = lowerPrompt.includes('fire');
                    const hasMonthly = lowerPrompt.includes('monthly');
                    
                    if (hasFire && hasMonthly) {
                        addCheck('AI Features', 'Workflow Builder', 'success', 'AI parsing logic works correctly');
                    } else {
                        addCheck('AI Features', 'Workflow Builder', 'error', 'AI parsing logic failed');
                    }
                } catch (error) {
                    addCheck('AI Features', 'Workflow Builder', 'error', 'AI Workflow Builder test failed', error.message);
                }

                // 7. Document Manager Test
                addCheck('Document Manager', 'File Upload', 'info', 'Testing file upload simulation...');
                try {
                    // Simulate file upload
                    const mockFile = new File(['test content'], 'test.txt', { type: 'text/plain' });
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        if (e.target.result) {
                            addCheck('Document Manager', 'File Upload', 'success', 'File upload simulation works');
                        } else {
                            addCheck('Document Manager', 'File Upload', 'error', 'File upload simulation failed');
                        }
                    };
                    
                    reader.readAsDataURL(mockFile);
                } catch (error) {
                    addCheck('Document Manager', 'File Upload', 'error', 'File upload test failed', error.message);
                }

                // 8. Analytics Test
                addCheck('Analytics', 'Data Processing', 'info', 'Testing analytics data processing...');
                try {
                    const testData = {
                        totalFiles: 10,
                        folderDistribution: { 'General': 5, 'Fire Safety': 3, 'HVAC': 2 },
                        fileTypes: { 'pdf': 4, 'docx': 3, 'jpg': 3 },
                        recentActivity: []
                    };
                    
                    const totalFiles = testData.totalFiles;
                    const folderCount = Object.keys(testData.folderDistribution).length;
                    const fileTypeCount = Object.keys(testData.fileTypes).length;
                    
                    if (totalFiles > 0 && folderCount > 0 && fileTypeCount > 0) {
                        addCheck('Analytics', 'Data Processing', 'success', 'Analytics data processing works');
                    } else {
                        addCheck('Analytics', 'Data Processing', 'error', 'Analytics data processing failed');
                    }
                } catch (error) {
                    addCheck('Analytics', 'Data Processing', 'error', 'Analytics test failed', error.message);
                }

                // 9. UI Components Test
                addCheck('UI', 'Modal System', 'info', 'Testing modal system...');
                try {
                    // Test if we can create modal elements
                    const modalDiv = document.createElement('div');
                    modalDiv.className = 'fixed inset-0 bg-black/60 flex items-center justify-center z-50';
                    
                    if (modalDiv.className.includes('fixed') && modalDiv.className.includes('inset-0')) {
                        addCheck('UI', 'Modal System', 'success', 'Modal CSS classes work correctly');
                    } else {
                        addCheck('UI', 'Modal System', 'error', 'Modal CSS classes failed');
                    }
                } catch (error) {
                    addCheck('UI', 'Modal System', 'error', 'Modal system test failed', error.message);
                }

                // 10. Performance Test
                addCheck('Performance', 'Memory Usage', 'info', 'Checking memory usage...');
                if (performance && performance.memory) {
                    const memory = performance.memory;
                    const usedMB = Math.round(memory.usedJSHeapSize / 1024 / 1024);
                    addCheck('Performance', 'Memory Usage', 'success', `Memory usage: ${usedMB}MB`);
                } else {
                    addCheck('Performance', 'Memory Usage', 'info', 'Memory API not available');
                }

                // Calculate overall status
                setTimeout(() => {
                    const errorCount = checks.filter(c => c.status === 'error').length;
                    const successCount = checks.filter(c => c.status === 'success').length;
                    const totalCount = checks.length;

                    if (errorCount === 0) {
                        setOverallStatus('success');
                    } else if (errorCount < totalCount / 2) {
                        setOverallStatus('warning');
                    } else {
                        setOverallStatus('error');
                    }

                    setIsRunning(false);
                }, 1000);
            }

            const getStatusIcon = (status) => {
                switch (status) {
                    case 'success': return '✅';
                    case 'error': return '❌';
                    case 'warning': return '⚠️';
                    default: return 'ℹ️';
                }
            };

            const getStatusColor = (status) => {
                switch (status) {
                    case 'success': return 'bg-green-50 border-green-400';
                    case 'error': return 'bg-red-50 border-red-400';
                    case 'warning': return 'bg-yellow-50 border-yellow-400';
                    default: return 'bg-blue-50 border-blue-400';
                }
            };

            const getOverallStatusColor = () => {
                switch (overallStatus) {
                    case 'success': return 'bg-green-100 border-green-500 text-green-800';
                    case 'error': return 'bg-red-100 border-red-500 text-red-800';
                    case 'warning': return 'bg-yellow-100 border-yellow-500 text-yellow-800';
                    default: return 'bg-blue-100 border-blue-500 text-blue-800';
                }
            };

            return (
                <div className="p-6 max-w-6xl mx-auto">
                    <div className="mb-6">
                        <h1 className="text-4xl font-bold mb-2">🔍 MainPro Platform Check</h1>
                        <p className="text-gray-600">Comprehensive platform health and functionality verification</p>
                    </div>

                    <div className="mb-6">
                        <button
                            onClick={runPlatformCheck}
                            disabled={isRunning}
                            className={`px-8 py-4 rounded-lg font-medium text-lg ${
                                isRunning 
                                    ? 'bg-gray-400 cursor-not-allowed' 
                                    : 'bg-blue-500 hover:bg-blue-600 text-white'
                            }`}
                        >
                            {isRunning ? '🔄 Running Platform Check...' : '🚀 Start Platform Check'}
                        </button>
                    </div>

                    {checks.length > 0 && (
                        <div className={`p-4 rounded-lg border-2 mb-6 ${getOverallStatusColor()}`}>
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">
                                    {overallStatus === 'success' ? '✅' : 
                                     overallStatus === 'error' ? '❌' : '⚠️'}
                                </span>
                                <span className="text-xl font-bold">
                                    Overall Status: {overallStatus.toUpperCase()}
                                </span>
                            </div>
                            <div className="text-sm mt-1">
                                {checks.filter(c => c.status === 'success').length} passed, 
                                {checks.filter(c => c.status === 'error').length} failed, 
                                {checks.filter(c => c.status === 'warning').length} warnings
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {['Infrastructure', 'Dependencies', 'Storage', 'Data', 'Browser', 'AI Features', 'Document Manager', 'Analytics', 'UI', 'Performance'].map(category => {
                            const categoryChecks = checks.filter(c => c.category === category);
                            if (categoryChecks.length === 0) return null;

                            return (
                                <div key={category} className="bg-white border rounded-lg p-4">
                                    <h3 className="text-lg font-semibold mb-3">{category}</h3>
                                    <div className="space-y-2">
                                        {categoryChecks.map((check, index) => (
                                            <div key={index} className={`p-3 rounded border-l-4 ${getStatusColor(check.status)}`}>
                                                <div className="flex items-center justify-between">
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-lg">{getStatusIcon(check.status)}</span>
                                                        <span className="font-medium">{check.feature}</span>
                                                    </div>
                                                    <span className="text-sm text-gray-500">{check.timestamp}</span>
                                                </div>
                                                <div className="text-sm text-gray-600 mt-1">{check.message}</div>
                                                {check.details && (
                                                    <div className="text-xs text-gray-500 mt-1">{check.details}</div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="mt-8 p-4 bg-blue-50 rounded-lg">
                        <h3 className="font-medium mb-2">🔗 Quick Access:</h3>
                        <div className="flex gap-4">
                            <a href="http://localhost:3000/index.html" target="_blank" className="text-blue-600 hover:underline">
                                MainPro v70.5
                            </a>
                            <a href="http://localhost:3000/debug-test.html" target="_blank" className="text-blue-600 hover:underline">
                                Debug Test
                            </a>
                            <a href="http://localhost:3000/test-fixes.html" target="_blank" className="text-blue-600 hover:underline">
                                Fixes Test
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<PlatformCheck />, document.getElementById('root'));
    </script>
</body>
</html>
